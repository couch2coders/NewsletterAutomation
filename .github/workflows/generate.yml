name: Generate Newsletter

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests anthropic beautifulsoup4 Pillow

      - name: Generate newsletter
        env:
          CLAUDE_API_KEY:         ${{ secrets.CLAUDE_API_KEY }}
          APIFY_API_KEY:          ${{ secrets.APIFY_API_KEY }}
          GOOGLE_PLACES_API_KEY:  ${{ secrets.GOOGLE_PLACES_API_KEY }}
          REALTOR_API_KEY:        ${{ secrets.REALTOR_API_KEY }}
          BRAVE_NEWS_API_KEY:     ${{ secrets.BRAVE_NEWS_API_KEY }}
          SKILL_PETS:             ${{ secrets.SKILL_PETS }}
          SKILL_RESTAURANTS:      ${{ secrets.SKILL_RESTAURANTS }}
          SKILL_LOWDOWN:          ${{ secrets.SKILL_LOWDOWN }}
          SKILL_REAL_ESTATE:      ${{ secrets.SKILL_REAL_ESTATE }}
        run: python Code/generate_newsletter.py

      - name: Commit README and images
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Remove old images from git so new ones are always staged
          git rm -rf images/ 2>/dev/null || true
          git add README.md
          git add --force images/

          git diff --cached --quiet || git commit -m "update newsletter — $(date +%Y-%m-%d)"
          git push
